name: Deploy to AWS ECS
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::866395943125:role/github-actions-terraform-role # We will need to create this role in AWS!
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          aws-region: us-east-1

      - name: Build and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/welcome-app-repo:latest .
          
          # Push the image to AWS, overwriting the old 'latest'
          docker push $ECR_REGISTRY/welcome-app-repo:latest

      - name: Force ECS to Reboot
        run: |
          # Service restart & deployment
          aws ecs update-service \
            --cluster python-app-cluster-name \
            --service python-app-service-name \
            --force-new-deployment